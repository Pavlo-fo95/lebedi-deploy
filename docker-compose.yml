services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    expose:
      - "8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    expose:
      - "80"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    depends_on:
      - frontend
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
